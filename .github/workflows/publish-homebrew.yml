name: Publish Homebrew Formula

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

jobs:
  publish-homebrew-formula:
    runs-on: ubuntu-22.04
    env:
      PLAN: ${{ inputs.plan }}
    if: ${{ !fromJson(inputs.plan).announcement_is_prerelease || fromJson(inputs.plan).publish_prereleases }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.HOTDATA_AUTOMATION_APP_ID }}
          private-key: ${{ secrets.HOTDATA_AUTOMATION_PRIVATE_KEY }}
          owner: hotdata-dev
          repositories: homebrew-tap,hotdata-cli

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: true
          repository: "hotdata-dev/homebrew-tap"
          token: ${{ steps.app-token.outputs.token }}

      - name: Fetch homebrew formulae
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: artifacts-*
          path: Formula/
          merge-multiple: true

      - name: Patch and commit formula files
        run: |
          git config --global user.name "hotdata-automation[bot]"
          git config --global user.email "hotdata-automation[bot]@users.noreply.github.com"

          for release in $(echo "$PLAN" | jq --compact-output '.releases[] | select([.artifacts[] | endswith(".rb")] | any)'); do
            filename=$(echo "$release" | jq '.artifacts[] | select(endswith(".rb"))' --raw-output)
            name=$(echo "$filename" | sed "s/\.rb$//")
            version=$(echo "$release" | jq .app_version --raw-output)

            export PATH="/home/linuxbrew/.linuxbrew/bin:$PATH"
            brew update
            brew style --except-cops FormulaAudit/Homepage,FormulaAudit/Desc,FormulaAuditStrict --fix "Formula/${filename}" || true

            # Add shell completions generation after the last bin.install line
            if ! grep -q 'generate_completions_from_executable' "Formula/${filename}"; then
              last_bin_install=$(grep -n 'bin\.install' "Formula/${filename}" | tail -1 | cut -d: -f1)
              if [ -n "$last_bin_install" ]; then
                sed -i "${last_bin_install}a\\    generate_completions_from_executable(bin/\"hotdata\", \"completions\")" "Formula/${filename}"
              fi
            fi

            git add "Formula/${filename}"
            git commit -m "${name} ${version}"
          done
          git push

      - name: Remove .rb from GitHub Release assets
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          TAG=$(echo "$PLAN" | jq -r '.announcement_tag')
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            exit 0
          fi
          for asset in $(gh release view "$TAG" --repo hotdata-dev/hotdata-cli --json assets -q '.assets[].name' | grep '\.rb$'); do
            gh release delete-asset "$TAG" "$asset" --repo hotdata-dev/hotdata-cli --yes
          done
